<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Igalus – Site de rencontre étudiant gratuit</title>
  <meta name="description" content="Igalus est un site de rencontre gratuit pour étudiants. Inscris-toi et rencontre d'autres étudiants près de chez toi.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <h1>Igalus</h1>
  <p>Le site de rencontre gratuit pour étudiants</p>

  <h2>Inscription</h2>
  <form action="#" method="post">
    <label>Prénom :</label><br>
    <input type="text" name="prenom" required><br><br>

    <label>Email étudiant :</label><br>
    <input type="email" name="email" required><br><br>

    <label>Mot de passe :</label><br>
    <input type="password" name="password" required><br><br>

    <button type="submit">S'inscrire</button>
  </form>

  <p>Déjà inscrit ? Connexion bientôt disponible.</p>

</body>
</html>
