<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test Firebase</title>
</head>
<body>

<h2>Test Firebase – Inscription</h2>

<input id="email" type="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Mot de passe"><br><br>
<button id="registerBtn">S’inscrire</button>

<p id="msg"></p>

<!-- ✅ FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<!-- ✅ FIREBASE CONFIG -->
<script>
  // ⚠️ COLLE ICI TON firebaseConfig EXACT (SANS MODIFIER)
  const firebaseConfig = {
    /* COLLE LE TIEN ICI */
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  console.log("✅ Firebase chargé");

  document.getElementById("registerBtn").onclick = () => {
    auth.createUserWithEmailAndPassword(
      email.value,
      password.value
    )
    .then(() => {
      msg.textContent = "✅ Compte créé";
    })
    .catch(e => {
      msg.textContent = e.message;
      console.error(e);
    });
  };
</script>

</body>
</html>
