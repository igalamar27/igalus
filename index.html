<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Igalus – Test Inscription</title>
</head>
<body>

<h2>Créer un compte</h2>

<input id="email" type="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Mot de passe"><br><br>

<button id="registerBtn">S’inscrire</button>

<p id="message"></p>

<!-- ✅ Firebase SDK (OBLIGATOIRE) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<!-- ✅ Firebase CONFIG (MET TES VRAIES VALEURS) -->
<script>
  const firebaseConfig = {
    apiKey: "TA_API_KEY",
    authDomain: "TON_PROJET.firebaseapp.com",
    projectId: "TON_PROJET",
    storageBucket: "TON_PROJET.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  console.log("✅ Firebase chargé");

  // 🔐 INSCRIPTION
  document.getElementById("registerBtn").addEventListener("click", () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const message = document.getElementById("message");

    auth.createUserWithEmailAndPassword(email, password)
      .then(() => {
        message.textContent = "✅ Compte créé avec succès";
        message.style.color = "green";
      })
      .catch(error => {
        message.textContent = error.message;
        message.style.color = "red";
        console.error(error);
      });
  });
</script>

</body>
</html>
``
