<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Igalus</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #f2f2f2;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.app {
  width: 100%;
  max-width: 360px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* CARTE */
.card {
  width: 100%;
  height: 70vh;
  background: #ddd;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 15px 30px rgba(0,0,0,0.3);
  touch-action: none;
}

/* IMAGE */
.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}

/* INFOS */
.info {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 20px;
  color: white;
  background: linear-gradient(
    to top,
    rgba(0,0,0,0.75),
    rgba(0,0,0,0)
  );
  pointer-events: none;
}

/* LABELS LIKE / NOPE */
.label {
  position: absolute;
  top: 20px;
  padding: 8px 14px;
  border: 3px solid;
  font-size: 22px;
  font-weight: bold;
  opacity: 0;
}

.like-label {
  left: 20px;
  color: #00c853;
  border-color: #00c853;
  transform: rotate(-15deg);
}

.nope-label {
  right: 20px;
  color: #ff1744;
  border-color: #ff1744;
  transform: rotate(15deg);
}

/* BOUTONS */
.buttons {
  display: flex;
  justify-content: space-between;
  width: 100%;
  margin-top: 20px;
}

button {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: none;
  font-size: 30px;
  cursor: pointer;
}

.nope {
  background: #d3d3d3;
}

.like {
  background: #ff4d6d;
  color: white;
}
</style>
</head>

<body>

<div class="app">

  <div id="card" class="card">
    <img id="photo">

    <div id="likeLabel" class="label like-label">LIKE</div>
    <div id="nopeLabel" class="label nope-label">NOPE</div>

    <div class="info">
      <h2 id="name"></h2>
      <p id="bio"></p>
    </div>
  </div>

  <div class="buttons">
    <button id="nopeBtn" class="nope">❌</button>
    <button id="likeBtn" class="like">❤️</button>
  </div>

</div>

<script>
// PROFILS
const profiles = [
  { name: "Emma, 25", bio: "Voyages et café ☕", photo: "https://picsum.photos/id/1027/400/600" },
  { name: "Lucas, 29", bio: "Sport et musique 🎧", photo: "https://picsum.photos/id/1005/400/600" },
  { name: "Sarah, 27", bio: "Art et photo 📸", photo: "https://picsum.photos/id/1011/400/600" }
];

let index = 0;

const card = document.getElementById("card");
const photo = document.getElementById("photo");
const nameEl = document.getElementById("name");
const bioEl = document.getElementById("bio");
const likeLabel = document.getElementById("likeLabel");
const nopeLabel = document.getElementById("nopeLabel");

function loadProfile() {
  const p = profiles[index];
  photo.src = p.photo;
  nameEl.textContent = p.name;
  bioEl.textContent = p.bio;
}
loadProfile();

let startX = 0;
let currentX = 0;

// GESTION SWIPE
function move(x) {
  currentX = x - startX;
  card.style.transform =
    `translateX(${currentX}px) rotate(${currentX / 12}deg)`;

  likeLabel.style.opacity = currentX > 0 ? Math.min(currentX / 100, 1) : 0;
  nopeLabel.style.opacity = currentX < 0 ? Math.min(-currentX / 100, 1) : 0;
}

function release() {
  if (currentX > 120) swipe("right");
  else if (currentX < -120) swipe("left");
  else reset();
}

function swipe(direction) {
  card.style.transition = "transform 0.3s";
  card.style.transform =
    direction === "right"
      ? "translateX(1000px) rotate(30deg)"
      : "translateX(-1000px) rotate(-30deg)";

  setTimeout(() => {
    index = (index + 1) % profiles.length;
    reset(true);
    loadProfile();
  }, 300);
}

function reset(hard = false) {
  card.style.transition = hard ? "none" : "transform 0.3s";
  card.style.transform = "translateX(0)";
  currentX = 0;
  likeLabel.style.opacity = 0;
  nopeLabel.style.opacity = 0;
}

// MOBILE
card.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  card.style.transition = "none";
});
card.addEventListener("touchmove", e => move(e.touches[0].clientX));
card.addEventListener("touchend", release);

// DESKTOP
card.addEventListener("mousedown", e => {
  startX = e.clientX;
  card.style.transition = "none";

  document.onmousemove = e => move(e.clientX);
  document.onmouseup = () => {
    document.onmousemove = null;
    document.onmouseup = null;
    release();
  };
});

// BOUTONS
document.getElementById("likeBtn").onclick = () => swipe("right");
document.getElementById("nopeBtn").onclick = () => swipe("left");
</script>

</body>
</html>
