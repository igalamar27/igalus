<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test Firebase Igalus</title>
</head>
<body>

<h2>Test Firebase</h2>

<input id="email" type="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Mot de passe"><br><br>
<button id="registerBtn">S'inscrire</button>

<p id="msg"></p>

<!-- ✅ 1. CHARGER FIREBASE CORRECTEMENT -->
https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.jsscript>
https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.jsscript>

<!-- ✅ 2. CONFIG FIREBASE (COLLE LE TIEN EXACT) -->
<script>
  const firebaseConfig = {
    apiKey: "TA_VRAIE_API_KEY",
    authDomain: "TON_PROJET.firebaseapp.com",
    projectId: "TON_PROJET",
    storageBucket: "TON_PROJET.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  console.log("✅ Firebase initialisé");

  document.getElementById("registerBtn").onclick = () => {
    auth.createUserWithEmailAndPassword(
      email.value,
      password.value
    ).then(() => {
      msg.textContent = "✅ Compte créé";
    }).catch(e => {
      msg.textContent = e.message;
      console.error(e);
    });
  };
</script>

</body>
</html>
