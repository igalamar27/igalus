<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Igalus</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  margin: 0;
  padding: 0;
}
.container {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}
.card {
  display: none;
  position: relative;
  height: 420px;
  background: #ddd;
  border-radius: 20px;
  overflow: hidden;
  touch-action: none;
}
.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.info {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 15px;
  color: white;
  background: linear-gradient(to top, rgba(0,0,0,.8), transparent);
}
.label {
  position: absolute;
  top: 20px;
  padding: 6px 12px;
  border: 3px solid;
  font-weight: bold;
  opacity: 0;
}
.like-label {
  left: 20px;
  color: green;
  border-color: green;
}
.nope-label {
  right: 20px;
  color: red;
  border-color: red;
}
.buttons {
  display: flex;
  justify-content: space-around;
  margin-top: 15px;
}
button {
  padding: 10px 20px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">

  <!-- INSCRIPTION -->
  <div id="authBox">
    <h3>Créer un compte</h3>
    <input id="email" type="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Mot de passe"><br><br>
    <button onclick="register()">S’inscrire</button>
    <p id="authMessage"></p>
    <hr>
  </div>

  <!-- CONNEXION -->
  <div id="loginBox">
    <h3>Se connecter</h3>
    <input id="loginEmail" type="email" placeholder="Email"><br><br>
    <input id="loginPassword" type="password" placeholder="Mot de passe"><br><br>
    <button onclick="login()">Se connecter</button>
    <p id="loginMessage"></p>
    <hr>
  </div>

  <!-- CARTE -->
  <div id="card" class="card">
    <img id="photo" src="https://via.placeholder.com/400x600?text=Profil">
    <div id="likeLabel" class="label like-label">LIKE</div>
    <div id="nopeLabel" class="label nope-label">NOPE</div>
    <div class="info">
      <h2 id="name"></h2>
      <p id="bio"></p>
    </div>
  </div>

  <!-- BOUTONS -->
  <div class="buttons">
    <button id="nopeBtn">❌</button>
    <button id="likeBtn">❤️</button>
  </div>

</div>

<!-- ✅ FIREBASE SDK (OBLIGATOIRE, NE PAS CHANGER) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- ✅ FIREBASE CONFIG (COLLE LE TIEN EXACT) -->
<script>
  const firebaseConfig = {
    apiKey: "COLLE_ICI_TA_API_KEY",
    authDomain: "TON_PROJET.firebaseapp.com",
    projectId: "TON_PROJET",
    storageBucket: "TON_PROJET.appspot.com",
    messagingSenderId: "XXXXX",
    appId: "XXXXX"
  };

  firebase.initializeApp(firebaseConfig);
</script>

<!-- ✅ SCRIPT IGLALUS -->
<script src="script.js"></script>

</body>
</html>
