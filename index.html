<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test Firebase Igalus</title>
</head>
<body>

<h2>Test Firebase</h2>

<input id="email" type="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Mot de passe"><br><br>
<button id="registerBtn">S’inscrire</button>

<p id="msg"></p>

<!-- ✅ FIREBASE DOIT ÊTRE CHARGÉ COMME ÇA (PAS AUTREMENT) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
  // 🔑 COLLE ICI LE firebaseConfig EXACT depuis Firebase Console
  const firebaseConfig = {
    apiKey: "COLLE_TA_VRAIE_API_KEY",
    authDomain: "TON_PROJET.firebaseapp.com",
    projectId: "TON_PROJET",
    storageBucket: "TON_PROJET.appspot.com",
    messagingSenderId: "XXXXX",
    appId: "XXXXX"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  console.log("✅ Firebase est bien chargé");

  document.getElementById("registerBtn").onclick = () => {
    auth.createUserWithEmailAndPassword(
      email.value,
      password.value
    ).then(() => {
      msg.textContent = "✅ Compte créé avec succès";
    }).catch(e => {
      msg.textContent = e.message;
      console.error(e);
    });
  };
</script>

</body>
</html>
