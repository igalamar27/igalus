<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Igalus</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

body {
  background: #f2f2f2;
  height: 100vh;
  overflow: hidden;
}

.app {
  max-width: 420px;
  margin: auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.card {
  position: relative;
  height: 75vh;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 15px 30px rgba(0,0,0,0.3);
  touch-action: none;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.info {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 20px;
  color: white;
  background: linear-gradient(
    to top,
    rgba(0,0,0,0.8),
    rgba(0,0,0,0)
  );
}

.buttons {
  display: flex;
  justify-content: center;
  margin: 15px 0;
}

.buttons button {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  font-size: 32px;
  border: none;
  margin: 0 25px;
}
.like { background: #ff4d6d; color: white; }
.nope { background: #d3d3d3; }
</style>
</head>

<body>

<div class="app">

  <div class="card" id="card">
    <img id="photo" src="">
    <div class="info">
      <h2 id="name"></h2>
      <p id="bio"></p>
    </div>
  </div>

  <div class="buttons">
    <button class="nope" onclick="swipeLeft()">❌</button>
    <button class="like" onclick="swipeRight()">❤️</button>
  </div>

</div>

<script>
// ✅ LISTE DES PROFILS
const profiles = [
  {
    name: "Alex, 22",
    bio: "Étudiant en informatique",
    photo: "https://picsum.photos/500/900?1"
  },
  {
    name: "Sam, 24",
    bio: "Design & UX",
    photo: "https://picsum.photos/500/900?2"
  },
  {
    name: "Chris, 21",
    bio: "Étudiant en commerce",
    photo: "https://picsum.photos/500/900?3"
  },
  {
    name: "Jamie, 23",
    bio: "Développement web",
    photo: "https://picsum.photos/500/900?4"
  }
];

let index = 0;

const card = document.getElementById("card");
const photo = document.getElementById("photo");
const nameEl = document.getElementById("name");
const bioEl = document.getElementById("bio");

let startX = 0;
let currentX = 0;
let dragging = false;

// ✅ AFFICHER UN PROFIL
function showProfile() {
  const p = profiles[index];
  photo.src = p.photo;
  nameEl.textContent = p.name;
  bioEl.textContent = p.bio;
  card.style.transform = "translateX(0) rotate(0)";
}

// ✅ SWIPE
function swipeRight() {
  card.style.transform = "translateX(1000px) rotate(25deg)";
  console.log("LIKE ❤️", profiles[index].name);
  nextProfile();
}

function swipeLeft() {
  card.style.transform = "translateX(-1000px) rotate(-25deg)";
  console.log("NOPE ❌", profiles[index].name);
  nextProfile();
}

function nextProfile() {
  setTimeout(() => {
    index = (index + 1) % profiles.length;
    showProfile();
  }, 300);
}

// ✅ GESTION DU TOUCH
function getX(e) {
  return e.touches ? e.touches[0].clientX : e.clientX;
}

card.addEventListener("touchstart", e => {
  dragging = true;
  startX = getX(e);
  card.style.transition = "none";
}, { passive: false });

card.addEventListener("touchmove", e => {
  if (!dragging) return;
  e.preventDefault();
  currentX = getX(e) - startX;
  card.style.transform =
    `translateX(${currentX}px) rotate(${currentX / 15}deg)`;
}, { passive: false });

card.addEventListener("touchend", () => {
  dragging = false;
  card.style.transition = "transform 0.3s";

  if (currentX > 120) swipeRight();
  else if (currentX < -120) swipeLeft();
  else card.style.transform = "translateX(0) rotate(0)";

  currentX = 0;
});

// ✅ INIT
showProfile();
</script>

</body>
</html>
``
