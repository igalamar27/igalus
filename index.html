<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Igalus</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

body {
  background: #f2f2f2;
  height: 100vh;
  overflow: hidden;
}

.app {
  max-width: 420px;
  margin: auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.card {
  position: relative;
  height: 75vh;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 15px 30px rgba(0,0,0,0.3);
  cursor: grab;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.info {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 20px;
  color: white;
  background: linear-gradient(
    to top,
    rgba(0,0,0,0.8),
    rgba(0,0,0,0)
  );
}

.buttons {
  display: flex;
  justify-content: center;
  margin: 15px 0;
}

.buttons button {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  font-size: 32px;
  border: none;
  margin: 0 25px;
}

.like { background: #ff4d6d; color: white; }
.nope { background: #d3d3d3; }
</style>
</head>

<body>

<div class="app">

  <div class="card" id="card">
    <img src="https://picsum.photos/500/900">
    <div class="info">
      <h2>Alex, 22</h2>
      <p>Étudiant en informatique</p>
    </div>
  </div>

  <div class="buttons">
    <button class="nope" onclick="swipe(-1)">❌</button>
    <button class="like" onclick="swipe(1)">❤️</button>
  </div>

</div>

<script>
const card = document.getElementById("card");

let startX = 0;
let currentX = 0;
let isDragging = false;

card.onpointerdown = e => {
  isDragging = true;
  startX = e.clientX;
  card.style.transition = "none";
  card.setPointerCapture(e.pointerId);
};

card.onpointermove = e => {
  if (!isDragging) return;
  currentX = e.clientX - startX;
  card.style.transform =
    `translateX(${currentX}px) rotate(${currentX / 15}deg)`;
};

card.onpointerup = () => {
  isDragging = false;
  card.style.transition = "transform 0.3s";

  if (currentX > 120) swipe(1);
  else if (currentX < -120) swipe(-1);
  else card.style.transform = "translateX(0) rotate(0)";

  currentX = 0;
};

function swipe(dir) {
  card.style.transform =
    `translateX(${dir * 1000}px) rotate(${dir * 25}deg)`;
  console.log(dir === 1 ? "LIKE ❤️" : "NOPE ❌");

  setTimeout(() => {
    card.style.transition = "none";
    card.style.transform = "translateX(0) rotate(0)";
  }, 300);
}
</script>

</body>
</html>
