<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Igalus</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #f2f2f2;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 90%;
  max-width: 360px;
  height: 70vh;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 15px 30px rgba(0,0,0,0.3);
  touch-action: none;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}

.info {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 20px;
  color: white;
  background: linear-gradient(
    to top,
    rgba(0,0,0,0.75),
    rgba(0,0,0,0)
  );
  pointer-events: none;
}
</style>
</head>

<body>

<div id="card" class="card">
  <img id="photo">
  <div class="info">
    <h2 id="name"></h2>
    <p id="bio"></p>
  </div>
</div>

<script>
// ✅ PROFILS IGLALUS
const profiles = [
  {
    name: "Emma, 25",
    bio: "Voyages et café ☕",
    photo: "https://picsum.photos/id/1027/400/600"
  },
  {
    name: "Lucas, 29",
    bio: "Sport & musique 🎧",
    photo: "https://picsum.photos/id/1005/400/600"
  },
  {
    name: "Sarah, 27",
    bio: "Art & photo 📸",
    photo: "https://picsum.photos/id/1011/400/600"
  },
  {
    name: "Noah, 31",
    bio: "Nature & randonnées 🌿",
    photo: "https://picsum.photos/id/1012/400/600"
  }
];

let index = 0;

// éléments
const card = document.getElementById("card");
const img = document.getElementById("photo");
const nameEl = document.getElementById("name");
const bioEl = document.getElementById("bio");

// charger profil
function loadProfile() {
  const p = profiles[index];
  img.src = p.photo;
  nameEl.textContent = p.name;
  bioEl.textContent = p.bio;
}
loadProfile();

// swipe logic
let startX = 0;
let currentX = 0;

function handleRelease() {
  if (currentX > 120) swipe("right");
  else if (currentX < -120) swipe("left");
  else reset();
}

function swipe(direction) {
  card.style.transition = "transform 0.3s";
  card.style.transform =
    direction === "right"
      ? "translateX(1000px) rotate(30deg)"
      : "translateX(-1000px) rotate(-30deg)";

  setTimeout(nextProfile, 300);
}

function reset() {
  card.style.transition = "transform 0.3s";
  card.style.transform = "translateX(0)";
  currentX = 0;
}
