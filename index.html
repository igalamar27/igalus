<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Igalus</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

body {
  background: #f2f2f2;
  height: 100vh;
  overflow: hidden;
}

.app {
  max-width: 420px;
  margin: auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.card {
  position: relative;
  height: 75vh;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 15px 30px rgba(0,0,0,0.3);
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none; /* ✅ LA SOLUTION */
}

.info {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 20px;
  color: white;
  background: linear-gradient(
    to top,
    rgba(0,0,0,0.8),
    rgba(0,0,0,0)
  );
  pointer-events: none;
}

.buttons {
  display: flex;
  justify-content: center;
  margin: 15px 0;
}

.buttons button {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  font-size: 32px;
  border: none;
  margin: 0 25px;
}
.like { background: #ff4d6d; color: white; }
.nope { background: #d3d3d3; }
</style>
</head>

<body>

<div class="app">

  <div class="card" id="card">
    <img id="photo">
    <div class="info">
      <h2 id="name"></h2>
      <p id="bio"></p>
    </div>
  </div>

  <div class="buttons">
    <button class="nope" onclick="swipe(-1)">❌</button>
    <button class="like" onclick="swipe(1)">❤️</button>
  </div>

</div>

<script>
const profiles = [
  { name: "Alex, 22", bio: "Étudiant en informatique", photo: "https://picsum.photos/500/900?1" },
  { name: "Sam, 24", bio: "Design & UX", photo: "https://picsum.photos/500/900?2" },
  { name: "Chris, 21", bio: "Commerce", photo: "https://picsum.photos/500/900?3" }
];

let index = 0;
const card = document.getElementById("card");
const photo = document.getElementById("photo");
const nameEl = document.getElementById("name");
const bioEl = document.getElementById("bio");

function showProfile() {
  const p = profiles[index];
  photo.src = p.photo;
  nameEl.textContent = p.name;
  bioEl.textContent = p.bio;
  card.style.transition = "none";
  card.style.transform = "translateX(0) rotate(0)";
}

let startX = 0;
let currentX = 0;
let dragging = false;

card.onpointerdown = e => {
  dragging = true;
  startX = e.clientX;
  card.setPointerCapture(e.pointerId);
  card.style.transition = "none";
};

card.onpointermove = e => {
  if (!dragging) return;
  currentX = e.clientX - startX;
  card.style.transform =
    `translateX(${currentX}px) rotate(${currentX / 15}deg)`;
};

card.onpointerup = () => {
  dragging = false;
  if (currentX > 120) swipe(1);
  else if (currentX < -120) swipe(-1);
  else card.style.transform = "translateX(0) rotate(0)";
  currentX = 0;
};

function swipe(dir) {
  card.style.transition = "transform 0.3s";
  card.style.transform =
    `translateX(${dir * 1000}px) rotate(${dir * 25}deg)`;
  setTimeout(() => {
    index = (index + 1) % profiles.length;
    showProfile();
  }, 300);
}

showProfile();
</script>

</body>
