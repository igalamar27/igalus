<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Drag</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #eee;
  display: flex;
  justify-content: center;
  align-items: center;
}

#box {
  width: 200px;
  height: 300px;
  background: red;
  border-radius: 20px;
  touch-action: none;
}
</style>
</head>

<body>

<div id="box"></div>

<script>
const box = document.getElementById("box");

let startX = 0;
let startY = 0;

box.addEventListener("pointerdown", e => {
  startX = e.clientX;
  startY = e.clientY;
  box.setPointerCapture(e.pointerId);
});

box.addEventListener("pointermove", e => {
  box.style.transform =
    `translate(${e.clientX - startX}px, ${e.clientY - startY}px)`;
});
</script>

</body>
</html>
